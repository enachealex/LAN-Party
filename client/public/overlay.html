<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; font-family: system-ui, sans-serif; }
    #wrap { position: absolute; inset: 0; }
    /* The remote video, dimmed so you can see your screen through it (~75% transparent). */
    #vid { width: 100%; height: 100%; object-fit: cover; opacity: 0.28; background: transparent; display: block; border-radius: 10px; }
    #wrap.solid #vid { opacity: 1; }
    /* Draggable header (only visible on hover) */
    #bar {
      position: absolute; top: 0; left: 0; right: 0; height: 26px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 6px; gap: 6px; -webkit-app-region: drag;
      background: linear-gradient(rgba(10,6,4,.75), rgba(10,6,4,0)); opacity: 0; transition: opacity .15s; border-radius: 10px 10px 0 0;
    }
    #wrap:hover #bar { opacity: 1; }
    #title { color: #fff; font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btns { display: flex; gap: 4px; -webkit-app-region: no-drag; }
    .btn { border: none; background: rgba(0,0,0,.5); color: #fff; width: 20px; height: 20px; border-radius: 5px; cursor: pointer; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .btn:hover { background: rgba(0,0,0,.75); }
    .btn.close:hover { background: #e0574d; }
    /* Bottom-right resize handle */
    #resize { position: absolute; right: 0; bottom: 0; width: 18px; height: 18px; cursor: nwse-resize; -webkit-app-region: no-drag; z-index: 5;
      background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,.6) 45%, rgba(255,255,255,.6) 55%, transparent 55%, transparent 72%, rgba(255,255,255,.6) 72%, rgba(255,255,255,.6) 82%, transparent 82%); }
    #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.55); font-size: 12px; }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="vid" autoplay playsinline></video>
    <div id="placeholder">Connecting to your call…</div>
    <div id="bar">
      <span id="title">🔴 LAN Party call</span>
      <span class="btns">
        <button class="btn" id="opacity" title="Toggle transparency">◐</button>
        <button class="btn" id="expand" title="Back to app">⤢</button>
        <button class="btn close" id="close" title="Close overlay">✕</button>
      </span>
    </div>
    <div id="resize" title="Resize"></div>
  </div>
  <script>
    const b = window.overlayBridge
    const vid = document.getElementById('vid')
    const wrap = document.getElementById('wrap')
    const placeholder = document.getElementById('placeholder')
    let pc = null

    function makePc() {
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] })
      pc.onicecandidate = (e) => { if (e.candidate) b.send({ type: 'candidate', candidate: e.candidate }) }
      pc.ontrack = (e) => { vid.srcObject = e.streams[0]; placeholder.style.display = 'none' }
      pc.onconnectionstatechange = () => { if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) placeholder.style.display = 'flex' }
      return pc
    }

    b.onSignal(async (msg) => {
      try {
        if (msg.type === 'offer') {
          if (!pc) makePc()
          await pc.setRemoteDescription(msg.sdp)
          const answer = await pc.createAnswer()
          await pc.setLocalDescription(answer)
          b.send({ type: 'answer', sdp: pc.localDescription })
        } else if (msg.type === 'candidate' && pc) {
          try { await pc.addIceCandidate(msg.candidate) } catch (_) {}
        } else if (msg.type === 'reset') {
          if (pc) { try { pc.close() } catch (_) {} pc = null }
          vid.srcObject = null; placeholder.style.display = 'flex'
        }
      } catch (err) { console.error('overlay signal error', err) }
    })

    document.getElementById('close').onclick = () => b.close()
    document.getElementById('expand').onclick = () => b.restore()
    document.getElementById('opacity').onclick = () => wrap.classList.toggle('solid')

    // Custom resize (frameless transparent windows don't always get OS edge-resize).
    const rz = document.getElementById('resize')
    rz.addEventListener('mousedown', (e) => {
      e.preventDefault()
      let lastX = e.screenX, lastY = e.screenY
      const move = (ev) => { b.resizeBy(ev.screenX - lastX, ev.screenY - lastY); lastX = ev.screenX; lastY = ev.screenY }
      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up) }
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up)
    })

    // Tell the main renderer we're ready to receive the offer.
    b.send({ type: 'ready' })
  </script>
</body>
</html>
