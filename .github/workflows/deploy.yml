name: Deploy

# Push-to-deploy: SSHes into the VPS and rebuilds the app there.
#
# Dormant until you enable it — in the GitHub repo settings:
#   1. Settings → Secrets and variables → Actions → **Variables**: add DEPLOY_ENABLED = true
#   2. **Secrets**: add
#        VPS_HOST     e.g. lanparty.thejumpvault.com (or the server IP)
#        VPS_USER     the SSH user
#        VPS_SSH_KEY  a private key whose public half is in that user's ~/.ssh/authorized_keys
#        VPS_PATH     path of the cloned repo on the VPS, e.g. /opt/lan-party
#
# The VPS just needs the repo cloned + Docker installed (see DEPLOY.md).

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            git pull --ff-only origin main
            docker compose up -d --build
            docker image prune -f
